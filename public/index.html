<!-- FILEPATH: index.html -->

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Jazz Chords Practice</title>
  </head>
  <body>
    <div class="options-container">
      <div class="options-toggle">
        <button id="options-button" aria-expanded="false">
          Options
        </button>
      </div>
      <div class="options-menu" hidden>
        <div class="options-group">
          <label for="key-select">Key:</label>
          <select id="key-select">
            <option value="">Random</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="G">G</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C#">C#</option>
            <option value="D#">D#</option>
            <option value="F#">F#</option>
            <option value="G#">G#</option>
            <option value="A#">A#</option>
            <option value="Db">Db</option>
            <option value="Eb">Eb</option>
            <option value="Gb">Gb</option>
            <option value="Ab">Ab</option>
            <option value="Bb">Bb</option>
          </select>
        </div>
        <div class="options-group">
          <label for="type-select">Type:</label>
          <select id="type-select">
            <option value="">Random</option>
            <option value="maj7">Maj7</option>
            <option value="min7">Min7</option>
            <option value="dom7">Dom7</option>
            <option value="min7b5">Min7b5</option>
            <option value="alt dom">Alt Dom</option>
            <option value="maj9">Maj9</option>
            <option value="min9">Min9</option>
            <option value="dom13">Dom13</option>
          </select>
        </div>
        <div class="options-group">
          <label for="string-set-select">String Set:</label>
          <select id="string-set-select">
            <option value="">Random</option>
            <option value="1">Set 1 (E,B,G,D)</option>
            <option value="2">Set 2 (B,G,D,A)</option>
          </select>
        </div>
        <div class="options-group">
          <button id="reset-options-button" class="reset-button">
            Reset All Options
          </button>
        </div>
        <div class="options-group danger-zone">
          <hr class="danger-divider">
          <label class="danger-label">Danger Zone</label>
          <button id="wipe-database-button" class="danger-button">
            Wipe All Session Data
          </button>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="problem-container">
        <span class="label" id="stringSetLabel">String Set:</span>
        <span id="stringSetTextField">--</span>
        <span class="label" id="rootLabel">Root:</span>
        <span id="rootTextField">--</span>
        <span class="label" id="keyLabel">Key:</span>
        <span id="keyTextField">--</span>
        <span class="label" id="typeLabel">Type:</span>
        <span id="typeTextField">--</span>
      </div>
      
      <div id="fretboard-container"></div>
      
      <div class="button-container">
        <button id="start-stop-button" role="button" aria-labelledby="start-stop-button-label"></button>
        <p class="label" id="start-stop-button-label">Start</p>
        <button id="cancel-button" class="hidden cancel-button" role="button">Cancel</button>
        <button id="mark-wrong-button" class="hidden" role="button">Mark Wrong</button>
      </div>

      <div class="status-bar" aria-live="polite">
        <p id="status-message" aria-hidden="true"></p>
        <p id="error-message" role="alert"></p>
      </div>
    </div>



    <!-- Architecture flag: set to 'refactored' to use new modular architecture -->
    <script>
      const useRefactoredArchitecture = new URLSearchParams(window.location.search).get('arch') === 'refactored';
      const scriptSrc = useRefactoredArchitecture ? 'app-refactored.js' : 'app.js';
      
      const script = document.createElement('script');
      script.type = 'module';
      script.src = scriptSrc;
      document.head.appendChild(script);
      
      console.log(`Loading ${useRefactoredArchitecture ? 'refactored' : 'legacy'} architecture`);
    </script>
  </body>
</html>
